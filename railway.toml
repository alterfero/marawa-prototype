[build]
builder = "RAILPACK"
buildCommand = "sh -lc 'npm ci --prefix frontend && npm run build --prefix frontend && python -m pip install ./backend'"

[deploy]
startCommand = "sh -lc 'cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port \"${PORT:-8000}\"'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
